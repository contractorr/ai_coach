name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  validate:
    uses: ./.github/workflows/validate-deploy.yml

  deploy:
    needs: [test, validate]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ~/stewardme
            git checkout -- .
            git pull origin main

            # Validate configuration before deploying
            echo "Validating docker-compose configuration..."
            docker compose -f docker-compose.prod.yml config > /dev/null

            # Check curriculum content mount exists
            if ! grep -q "./content:/app/content" docker-compose.prod.yml; then
              echo "ERROR: docker-compose.prod.yml missing curriculum content mount"
              exit 1
            fi

            # Verify content directory exists
            if [ ! -d "content/curriculum" ]; then
              echo "ERROR: content/curriculum directory not found"
              exit 1
            fi

            echo "✓ Configuration validated"

            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            docker image prune -f
